name: CI Build and Smoke Test (egret repo)

on:
  push:
    branches: [ main, work ]
  pull_request:
    branches: [ main, work ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip build

      - name: Install TOML helper
        run: |
          python -m pip install toml

      - name: Read package version
        id: read_version
        run: |
          VERSION=$(python -c "import re,sys;print(re.search(r'__version__\\s*=\\s*[\"\']([^\"\']+)[\"\']', open('egret/version.py').read()).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Sync pyproject version (safe)
        run: |
          echo "Syncing pyproject.toml project.version from egret/version.py using scripts/sync_version.py"
          python scripts/sync_version.py --version-file egret/version.py --pyproject pyproject.toml

      - name: Build wheel (PEP 517 / scikit-build-core)
        run: |
          python -m build -w -o dist

      - name: Create venv and install wheel
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl

        - name: Lightweight verification (presence + ldd)
        run: |
          source .venv/bin/activate
          # locate installed egret package and compiled extension
          SO=$(python - <<'PY'
    import importlib.util, sys, os, glob, site
    spec = importlib.util.find_spec('egret')
    pkgdir = None
    if spec and spec.submodule_search_locations:
      pkgdir = list(spec.submodule_search_locations)[0]
    else:
      for p in site.getsitepackages():
        candidate = os.path.join(p, 'egret')
        if os.path.isdir(candidate):
          pkgdir = candidate
          break
    if not pkgdir:
      print('')
    else:
      matches = glob.glob(os.path.join(pkgdir, 'cppegret*.so')) + glob.glob(os.path.join(pkgdir, 'cppegret*.cpython-*-*.so'))
      print(matches[0] if matches else '')
    PY
    )
          if [ -z "$SO" ]; then echo "Compiled extension not found in installed package"; exit 1; fi
          echo "Found shared object: $SO"
          echo "ldd output:"; ldd "$SO" | sed -n '1,200p'
          if ldd "$SO" | grep -i "not found"; then echo "Missing shared library dependencies"; ldd "$SO"; exit 1; fi
